<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能文案生成</title>
    <!-- 引入外部 CSS 文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-title">
                <div class="header-icon">AI</div>
                <span>AI智能文案生成</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="clearHistory()" title="清空历史">✕</button>
            </div>
        </header>

        <!-- 聊天/历史记录区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;">💬</div>
                <div>选择模式，开始生成专属文案</div>
                <div style="margin-top: 8px; font-size: 12px; opacity: 0.7;">支持自定义 OpenAI 格式 API</div>
            </div>
        </div>

        <!-- 输入与控制区域 -->
        <div class="input-section">
            <!-- 模式切换标签 -->
            <div class="mode-tabs">
                <button class="mode-tab" data-mode="express" onclick="switchMode('express')">
                    <span>💖</span> 帮我表达
                </button>
                <button class="mode-tab" data-mode="reply" onclick="switchMode('reply')">
                    <span>💬</span> 帮我回复
                </button>
                <button class="mode-tab active" data-mode="love" onclick="switchMode('love')">
                    <span>💕</span> 恋爱语录
                </button>
                <button class="settings-btn-inline" onclick="openSettings()" title="通用设置">⚙️</button>
            </div>

            <!-- 输入框（根据模式变化） -->
            <div class="input-container">
                <input type="text" class="text-input" id="userInput" placeholder="选择模式后开始使用..." maxlength="300">
                <button class="input-action" onclick="handleVoiceInput()" title="语音输入">🎤</button>
                <button class="input-action send" onclick="handleGenerate()" title="生成">↑</button>
            </div>

            <!-- 风格选择器（帮我表达/回复模式） -->
            <div class="style-selector" id="styleSelector">
                <div class="style-hint" id="styleHint">点击下面的风格帮你表达润色</div>
                <div class="style-grid" id="styleGrid">
                    <!-- 风格按钮由JS生成 -->
                </div>
            </div>
        </div>

        <!-- 恋爱语录分类（默认显示） -->
        <div class="category-container active" id="categoryContainer">
            <!-- 开场白 -->
            <div class="category-section">
                <div class="category-title">开场白</div>
                <div class="buttons-grid">
                    <button class="quick-btn" onclick="generateLoveContent('self-intro')">
                        <span class="emoji">🌟</span>
                        <span>自我介绍</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('ice-breaker')">
                        <span class="emoji">🎉</span>
                        <span>万能开场</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('goodnight')">
                        <span class="emoji">😴</span>
                        <span>晚安</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('funny-morning')">
                        <span class="emoji">😜</span>
                        <span>搞笑早安</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('flirty')">
                        <span class="emoji">💋</span>
                        <span>撩一撩</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('daily-thoughts')">
                        <span class="emoji">🙈</span>
                        <span>每日碎碎念</span>
                    </button>
                </div>
            </div>

            <!-- 开启话题 -->
            <div class="category-section">
                <div class="category-title">开启话题</div>
                <div class="buttons-grid">
                    <button class="quick-btn" onclick="generateLoveContent('deep-talk')">
                        <span class="emoji">😜</span>
                        <span>破冰话题</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('dating')">
                        <span class="emoji">🤗</span>
                        <span>愉快相亲</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('hobbies')">
                        <span class="emoji">🎨</span>
                        <span>兴趣挖掘</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('daily-life')">
                        <span class="emoji">💫</span>
                        <span>生活日常</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('about-love')">
                        <span class="emoji">💖</span>
                        <span>关于爱情</span>
                    </button>
                </div>
            </div>

            <!-- 表白 -->
            <div class="category-section">
                <div class="category-title">表白</div>
                <div class="buttons-grid">
                    <button class="quick-btn" onclick="generateLoveContent('ambiguous')">
                        <span class="emoji">💕</span>
                        <span>暧昧情话</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('romantic')">
                        <span class="emoji">😍</span>
                        <span>肉麻表白</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('confession')">
                        <span class="emoji">💘</span>
                        <span>一句表白</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('classical')">
                        <span class="emoji">🌿</span>
                        <span>浪漫古风</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('announce')">
                        <span class="emoji">🌹</span>
                        <span>高甜官宣</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('corny')">
                        <span class="emoji">💋</span>
                        <span>土味情话</span>
                    </button>
                </div>
            </div>

            <!-- 恋爱邀约 -->
            <div class="category-section">
                <div class="category-title">恋爱邀约</div>
                <div class="buttons-grid">
                    <button class="quick-btn" onclick="generateLoveContent('ask-wechat')">
                        <span class="emoji">📱</span>
                        <span>要微信</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('ask-photo')">
                        <span class="emoji">📷</span>
                        <span>要照片</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('dinner')">
                        <span class="emoji">🍴</span>
                        <span>约吃饭</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('movie')">
                        <span class="emoji">🎬</span>
                        <span>约电影</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('meet')">
                        <span class="emoji">🥂</span>
                        <span>见面邀约</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('game')">
                        <span class="emoji">🌀</span>
                        <span>约游戏</span>
                    </button>
                </div>
            </div>

            <!-- 情绪价值 -->
            <div class="category-section">
                <div class="category-title">情绪价值</div>
                <div class="buttons-grid">
                    <button class="quick-btn" onclick="generateLoveContent('compliment')">
                        <span class="emoji">🌈</span>
                        <span>彩虹夸夸</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('comfort')">
                        <span class="emoji">👍</span>
                        <span>安慰鼓励</span>
                    </button>
                    <button class="quick-btn" onclick="generateLoveContent('apologize')">
                        <span class="emoji">😘</span>
                        <span>撒娇认错</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通用设置模态框 -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettingsOnOverlay(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title">API 配置</h3>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">API 地址</label>
                    <input type="text" class="form-input" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions">
                    <div class="form-hint">支持 OpenAI 格式的第三方 API 接口地址</div>
                </div>
                <div class="form-group">
                    <label class="form-label">API 密钥</label>
                    <input type="password" class="form-input" id="apiKey" placeholder="sk-...">
                    <div class="form-hint">您的 API Key，仅存储在本地浏览器中</div>
                </div>
                <div class="form-group">
                    <label class="form-label">模型名称</label>
                    <input type="text" class="form-input" id="modelName" placeholder="gpt-3.5-turbo">
                    <div class="form-hint">例如：gpt-4, gpt-3.5-turbo, claude-3等</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn btn-primary" onclick="saveSettings()">保存配置</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <!-- 引入外部 JavaScript 文件 -->
    <script src="script.js"></script>
</body>
</html>
